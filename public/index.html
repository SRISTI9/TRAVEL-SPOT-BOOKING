<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Slider</title>
  <link rel="stylesheet" href="index.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body>
  <div class="container">
    <div class="slide">

      <!-- Vizag Beach -->
      <div class="item" style="background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmgdrVqAyKo35_-eo6WD7BS0eKw20K-x10Ag&s);">
        <div class="content">
          <div class="name">Vizag Beach</div>
          <div class="description"></div>
          <button class="read-more" data-description="This is a well-known beach and most popular among other reasons being located at the city Centre, it is the most happening place in Vizag at the weekends. It is surrounded by reputed hotels, people from all over the country will come here, thus making it a crowded place. It has numerous museums such as VMRDA INS Kursura Submarine Museum, Visakha Museum and Sea Harrier Museum. ">Read more</button>
          <button class="show-less" style="display:none;">Show Less</button>
          <button class="book-now" style="display:none;">Book Now</button>
        </div>
      </div>

      <!-- Simhachalam Temple -->
      <div class="item" style="background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQUq41XcOlocCg_wQeQBiZovbXhJRcYr1IGPQ&s);">
        <div class="content">
          <div class="name">Simhachalam Temple</div>
          <div class="description"></div>
          <button class="read-more" data-description="Simhachalam is a place of pilgrimage in Visakhapatnam mandal. It is situated on the Simhachalam range of hills about 16 km. from Visakhapatnam connected by both rail and road. The Simhachalam temple, the man lion incarnation of Vishnu is the most famous, the richest and the best sculptured shrine.">Read more</button>
          <button class="show-less" style="display:none;">Show Less</button>
          <button class="book-now" style="display:none;">Book Now</button>
        </div>
      </div>

      <!-- Lighthouse -->
      <div class="item" style="background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTp0JKZBLdvfOtWcLp5c6zn6tFffsjnnbAnOQ&s);">
        <div class="content">
          <div class="name">Lighthouse</div>
          <div class="description"></div>
          <button class="read-more" data-description="The Vizag Lighthouse, located on the stunning Dolphin’s Nose Hill, is one of the most iconic landmarks in Visakhapatnam (Vizag), Andhra Pradesh. Standing tall at around 174 meters above sea level, this lighthouse offers panoramic views of the Bay of Bengal, nearby beaches like Yarada Beach, and the bustling Vizag Port.">Read more</button>
          <button class="show-less" style="display:none;">Show Less</button>
          <button class="book-now" style="display:none;">Book Now</button>
        </div>
      </div>

      <!-- Dolphin's Nose View Point -->
      <div class="item" style="background-image: url(https://ootytourism.co.in/images/headers/dolphins-nose-coonoor-entry-fee-timings-holidays-reviews-header.jpg);">
        <div class="content">
          <div class="name">Dolphin's Nose View Point</div>
          <div class="description"></div>
          <button class="read-more" data-description="At 6600 ft above sea level, the view from the dolphin’s nose is breath-taking. An ideal spot for those interested in trekking, the trail to the Dolphin’s Nose covers a distance of 3 kms in the Palani Hill Range. This view point is a favourite among the tourists who come to adore the glory of the Princess of hill-stations. Kodaikanal proudly fosters this location as an ideal spot from which one may marvel at the glory of its lush green landscapes, rough terrains, and the rugged charm of the towns.">Read more</button>
          <button class="show-less" style="display:none;">Show Less</button>
          <button class="book-now" style="display:none;">Book Now</button>
        </div>
      </div>

      <!-- Borra Caves -->
      <div class="item" style="background-image: url(https://t3.ftcdn.net/jpg/03/74/14/26/360_F_374142654_ctcLrxDQ4cMnNAnaogXJhH0buJIbc8P5.jpg);">
        <div class="content">
          <div class="name">Borra Caves</div>
          <div class="description"></div>
          <button class="read-more" data-description="Located in the Ananthagiri mandal of the Visakhapatnam district in Andhra Pradesh are one of the largest caves of the country known as Borra Caves.Discovered by William King George of the Geological Survey of India, these one million year old caves attract huge number of tourists every day and have become one of the major attractions of Vizag. Located at an elevation of 1400 m above sea level, these beautiful caves are a visual treat to the tourists. There are several legends regarding the discovery of the caves among the tribals living here. According to a popular legend, Borra caves were discovered when a cowherd while searching for his lost cow came across these caves. He found a Shiva Lingam inside the cave and believed that Lord Shiva has saved his cow.">Read more</button>
          <button class="show-less" style="display:none;">Show Less</button>
          <button class="book-now" style="display:none;">Book Now</button>
        </div>
      </div>

      <!-- Araku Valley -->
      <div class="item" style="background-image: url(https://media.istockphoto.com/id/1351966272/photo/araku-valley-visakhapatnam-andhra-pradesh.jpg?s=612x612&w=0&k=20&c=MBflBnf3Jx6is9KlT0-fBRqvEPo28SZA7lJ-n5Zfzi4=);">
        <div class="content">
          <div class="name">Araku Valley</div>
          <div class="description"></div>
          <button class="read-more" data-description="Araku is located in the Eastern Ghats about 114 kilometres (71 mi) from Visakhapatnam, close to the Odisha state border. The Anantagiri and Sunkarimetta Reserved Forest, which are part of Araku Valley, are rich in biodiversity and are mined for bauxite.[2] Galikonda hill rising to a height of 5,000 feet (1,500 m) is amongst the highest peaks in Andhra Pradesh. The average rainfall is 1,700 millimetres (67 in), the bulk of which is received during June–October.">Read more</button>
          <button class="show-less" style="display:none;">Show Less</button>
          <button class="book-now" style="display:none;">Book Now</button>
        </div>
      </div>

      <!-- Kursura Submarine -->
      <div class="item" style="background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvPmC_zkasT65InwDNWO7PMvjzb0pKFb-YNQ&s);">
        <div class="content">
          <div class="name">Kursura Submarine</div>
          <div class="description"></div>
          <button class="read-more" data-description="Vizag is known not just for the amazing beaches, but many other places that attract visitors from all over the country. One such place is INS Kurusura submarine museum, a museum established at the beach of Rama Krishna. INS Kurusura is a submarine constructed by Russians in the year 1969. It reached Visakhapatnam in 1970 via the Baltic Sea and since then served the Indian Navy. INS Kurusura served the Indian Navy for 31 years and then it was decommissioned and turned into a museum in 2001. With a length of 91.3 meters and breadth of 8 meters, the INS Kurusura submarine played a vital role in a number of wars including the 1971 Indo-Pak war.">Read more</button>
          <button class="show-less" style="display:none;">Show Less</button>
          <button class="book-now" style="display:none;">Book Now</button>
        </div>
      </div>

    </div>

    <div class="movementButton">
      <button class="prev"><i class="fa-solid fa-arrow-left"></i></button>
      <button class="next"><i class="fa-solid fa-arrow-right"></i></button>
    </div>
  </div>

  <script src="./index.js"></script>
  <script>
    document.querySelectorAll('.read-more').forEach(button => {
      button.addEventListener('click', function () {
        const description = this.dataset.description;
        const contentDiv = this.parentElement;
        const descriptionDiv = contentDiv.querySelector('.description');
        const showLessButton = contentDiv.querySelector('.show-less');
        const bookNowButton = contentDiv.querySelector('.book-now');
  
        descriptionDiv.textContent = description;
        showLessButton.style.display = 'inline-block';
        bookNowButton.style.display = 'inline-block';
        this.style.display = 'none';
      });
    });
  
    document.querySelectorAll('.show-less').forEach(button => {
      button.addEventListener('click', function () {
        const contentDiv = this.parentElement;
        const readMoreButton = contentDiv.querySelector('.read-more');
        const descriptionDiv = contentDiv.querySelector('.description');
        const bookNowButton = contentDiv.querySelector('.book-now');
  
        descriptionDiv.innerText = description;

        bookNowButton.style.display = 'none';
        readMoreButton.style.display = 'inline-block';
        this.style.display = 'none';
      });
    });
  
    document.querySelectorAll('.book-now').forEach(button => {
      button.addEventListener('click', function () {
        const spotName = this.parentElement.querySelector('.name').textContent;
        localStorage.setItem('selectedSpot', spotName);
        window.location.href = 'booking.html';
      });
    });
  </script>


  <script src="//code.tidio.co/bbpc5f2kmks4ahcd0x2shtzmjdc2obrq.js" async></script>
</body>
</html>
